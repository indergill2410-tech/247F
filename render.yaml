services:
  - type: web
    name: 247f-api
    runtime: node
    plan: starter
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/fixit247 build && node artifacts/api-server/build.mjs
    startCommand: node artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

  - type: web
    name: 247f-frontend
    runtime: static
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/fixit247 build
    staticPublishPath: ./artifacts/fixit247/dist/public
    envVars:
      - key: NODE_ENV
        value: production
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: 247f-db
    plan: starter
    databaseName: fixit247
