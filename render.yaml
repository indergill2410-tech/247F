services:
  - type: web
    name: 247f-api
    runtime: node
    plan: starter
    # Note: the API service serves the built frontend via express.static().
    # The 247f-frontend static service below also builds it as a standalone CDN deploy.
    # Only one build of the frontend is needed here — the API service build.
    buildCommand: npm install -g pnpm --prefix=$HOME && export PATH=$HOME/bin:$PATH && pnpm install --frozen-lockfile && pnpm --filter @workspace/db run push-force && pnpm --filter @workspace/fixit247 build && pnpm --filter @workspace/api-server build
    startCommand: node artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        # IMPORTANT: set this once in the Render dashboard and keep sync: false.
        # generateValue: true would regenerate on every deploy, invalidating all JWTs.
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

  - type: web
    name: 247f-frontend
    runtime: static
    # Reuses the artifact already built by the API service build above.
    # If deploying the static service independently, the build below is self-contained.
    buildCommand: npm install -g pnpm --prefix=$HOME && export PATH=$HOME/bin:$PATH && pnpm install --frozen-lockfile && pnpm --filter @workspace/fixit247 build
    staticPublishPath: ./artifacts/fixit247/dist/public
    envVars:
      - key: NODE_ENV
        value: production
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: 247f-db
    plan: starter
    databaseName: fixit247
