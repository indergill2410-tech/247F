<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="110%" r="70%">
      <stop offset="0%" stop-color="#2e1f00"/>
      <stop offset="50%" stop-color="#130f06"/>
      <stop offset="100%" stop-color="#070604"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#ffffff" opacity="0.04"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Gold accent bar top -->
  <rect x="0" y="0" width="1200" height="5" fill="#ffc800"/>

  <!-- Wrench icon (simplified) -->
  <g transform="translate(140, 220)" opacity="0.12" fill="#ffc800">
    <rect x="0" y="40" width="160" height="30" rx="15"/>
    <rect x="55" y="0" width="30" height="100" rx="15"/>
    <rect x="15" y="0" width="50" height="30" rx="15"/>
    <rect x="95" y="70" width="50" height="30" rx="15"/>
  </g>

  <!-- Brand mark -->
  <text x="140" y="280" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="900" fill="#ffc800" letter-spacing="-0.5" opacity="0.6">🔧</text>

  <!-- Logo text -->
  <text x="140" y="330" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="80" font-weight="900" fill="#ffffff" letter-spacing="-2">Fixit</text>
  <text x="372" y="330" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="80" font-weight="900" fill="#ffc800" letter-spacing="-2"> 24/7</text>

  <!-- Tagline -->
  <text x="140" y="390" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="500" fill="#ffffff" opacity="0.6">Find trusted local tradies, fast.</text>

  <!-- Divider -->
  <rect x="140" y="420" width="60" height="3" rx="2" fill="#ffc800"/>

  <!-- Sub-tagline -->
  <text x="140" y="470" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" fill="#ffffff" opacity="0.4">Plumbing · Electrical · Carpentry · Painting · and more</text>

  <!-- CTA badge -->
  <rect x="140" y="510" width="260" height="48" rx="24" fill="#ffc800"/>
  <text x="270" y="541" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="800" fill="#000000">Post a Job for Free →</text>

  <!-- Right side decorative circles -->
  <circle cx="950" cy="315" r="180" fill="#ffc800" opacity="0.04"/>
  <circle cx="950" cy="315" r="130" fill="#ffc800" opacity="0.04"/>
  <circle cx="950" cy="315" r="80" fill="#ffc800" opacity="0.06"/>

  <!-- Right side text -->
  <text x="950" y="290" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#ffc800" opacity="0.8">Australia's</text>
  <text x="950" y="320" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#ffc800" opacity="0.8">home repair</text>
  <text x="950" y="350" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#ffc800" opacity="0.8">marketplace</text>
</svg>
